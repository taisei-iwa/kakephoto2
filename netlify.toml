# Netlify build settings for KAKEPHOTO (Next.js App Router).
# Netlify auto-detects Next.js via @netlify/plugin-nextjs and OpenNext.
# Keeping these explicit so the repo is portable across owners.

[build]
  command = "npm run build"
  publish = ".next"

[[headers]]
  for = "/.well-known/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build.environment]
  NODE_VERSION = "20"

# When deploying to Netlify, set these in the dashboard
# (Site settings > Environment variables) — do NOT commit them:
#   NEXT_PUBLIC_SITE_URL = "https://kakephoto.com"
#   NEXT_PUBLIC_GA_ID    = "G-XXXXXXXXXX"  (if Google Analytics is wired up)
